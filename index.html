<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Elysian Store | Elegan & Modern</title>
    <!-- Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&family=Playfair+Display:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- SPLASH SCREEN dengan animasi smooth -->
<div id="splash" class="splash-screen">
    <div class="splash-content">
        <div class="splash-logo">Elysian</div>
        <div class="splash-sub">TIMELESS ELEGANCE</div>
        <div class="splash-spinner"></div>
    </div>
</div>

<!-- Main App Container (akan tampil setelah splash) -->
<div id="app" class="app-container hidden">
    <div id="root"></div>
</div>

<!-- Firebase Config (isi dengan config-mu) -->
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="main.js"></script>
</body>
</html>
